<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demoness Gateway</title>
    <style>
        /* Existing styles */

        /* Wings CSS styling */
        .wings {
            position: absolute;
            width: 100%;
            height: auto;
            animation: floatSigilTop 5s infinite;
        }

        @keyframes floatSigilTop {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="sigil">
        <img src="path_to_wings_image.png" alt="Wings" class="wings">
    </div>
    <div id="gate-actions">
        <button onclick="toggleWings()">Wings</button>
    </div>
    <script>
        function toggleWings() {
            const wings = document.querySelector('.wings');
            wings.style.display = wings.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
